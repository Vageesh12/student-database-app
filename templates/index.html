<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Database</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .container {

            background: white;

            width: 350px;

            padding: 35px;

            border-radius: 15px;

            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);

        }

        h1 {

            text-align: center;

            margin-bottom: 30px;

            color: #1e3c72;
        }

        label {

            font-weight: bold;

            color: #333;
        }

        input {

            width: 100%;

            padding: 12px;

            margin-top: 8px;
            margin-bottom: 20px;

            border: 1px solid #ccc;

            border-radius: 8px;

            font-size: 15px;

            box-sizing: border-box;

            transition: 0.3s;
        }

        input:focus {

            border-color: #2a5298;

            outline: none;

            box-shadow: 0 0 8px rgba(42, 82, 152, 0.3);
        }

        button {

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 8px;

            background: #1e3c72;

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #16325c;
        }

        .footer {

            text-align: center;

            margin-top: 15px;

            color: gray;

            font-size: 13px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>CPI collector</h1>

        <form action="/submit" method="POST">

            <label>Name</label>
            <input type="text" name="name" placeholder="Enter student name" required>

            <label>Roll Number</label>
            <input type="text" name="roll" placeholder="Enter roll number" required>

            <label>CPI</label>
            <input type="number" step="0.01" name="cpi" placeholder="Enter CPI" required>

            <button type="submit">Save Student</button>

        </form>

        <div class="footer">
            Student Database System
        </div>

    </div>

</body>

</html>
